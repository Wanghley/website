name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - run: yarn generate-sitemap && yarn build
        env:
          REACT_APP_WEB3FORMS_ACCESS_KEY: ${{ secrets.REACT_APP_WEB3FORMS_ACCESS_KEY }}
          REACT_APP_cms_api_token: ${{ secrets.REACT_APP_CMS_API_TOKEN }}
          REACT_APP_cms_base_url: ${{ secrets.REACT_APP_CMS_BASE_URL }}
          REACT_APP_projects_api_url: ${{ secrets.REACT_APP_PROJECTS_API_URL }}
          REACT_APP_skills_api_url: ${{ secrets.REACT_APP_SKILLS_API_URL }}
          REACT_APP_testimonials_api_url: ${{ secrets.REACT_APP_TESTIMONIALS_API_URL }}
          REACT_APP_timeline_api_url: ${{ secrets.REACT_APP_TIMELINE_API_URL }}
          REACT_APP_POSTHOG_KEY: ${{ secrets.REACT_APP_POSTHOG_KEY }}
          REACT_APP_POSTHOG_HOST: ${{ secrets.REACT_APP_POSTHOG_HOST }}
          
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBSITE_WANGHLEY }}
          projectId: website-wanghley